name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        run: rustup update stable && rustup component add rustfmt
      - name: Rust cache
        uses: Swatinem/rust-cache@v2
      - name: Check formatting
        run: cargo fmt --all --check

  test:
    name: Workspace Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        run: rustup update stable
      - name: Rust cache
        uses: Swatinem/rust-cache@v2
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y pkg-config libssl-dev libdbus-1-dev libudev-dev jq
      - name: Install Soroban CLI (optional but useful for integration tests)
        run: cargo install --locked soroban-cli || true
      - name: Run tests
        run: cargo test --workspace

  artifacts:
    name: Contract Artifacts (WASM + spec)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        run: rustup update stable && rustup target add wasm32-unknown-unknown
      - name: Rust cache
        uses: Swatinem/rust-cache@v2
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y pkg-config libssl-dev libdbus-1-dev libudev-dev jq
      - name: Install Soroban CLI
        run: cargo install --locked soroban-cli
      - name: Build contracts
        # Fails clearly if any contract stops building for release output.
        run: |
          cargo build --release --target wasm32-unknown-unknown \
            -p xlm-ns-registry \
            -p xlm-ns-registrar \
            -p xlm-ns-resolver \
            -p xlm-ns-auction \
            -p xlm-ns-subdomain \
            -p xlm-ns-nft \
            -p xlm-ns-bridge
      - name: Verify WASM outputs exist
        run: |
          for crate in xlm_ns_registry xlm_ns_registrar xlm_ns_resolver xlm_ns_auction xlm_ns_subdomain xlm_ns_nft xlm_ns_bridge; do
            wasm="target/wasm32-unknown-unknown/release/${crate}.wasm"
            if [ ! -f "$wasm" ]; then
              echo "ERROR: expected WASM output not found: $wasm" >&2
              exit 1
            fi
            echo "OK: $wasm ($(wc -c < "$wasm") bytes)"
          done
      - name: Collect artifacts
        run: |
          mkdir -p artifacts/wasm artifacts/specs
          cp target/wasm32-unknown-unknown/release/xlm_ns_*.wasm artifacts/wasm/

          # Generate contract specs for each WASM
          for wasm in artifacts/wasm/*.wasm; do
            base="$(basename "${wasm%.wasm}")"
            soroban contract spec --wasm "$wasm" --output json > "artifacts/specs/${base}.json"
          done
      - name: Check contract specs against baseline
        run: ./scripts/check-contract-specs.sh specs/baseline artifacts/specs
      - name: Verify SDK bindings against contract specs
        run: scripts/check-sdk-bindings.sh artifacts/specs
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: soroban-contract-artifacts-${{ github.sha }}
          path: artifacts
          # Retain artifacts for 90 days so deployment and verification workflows
          # can consume reproducible WASM outputs long after the build completes.
          retention-days: 90
